<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASTRO - Bugil Academy</title>

  <link rel="stylesheet" href="style.css">

  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap"
    rel="stylesheet"
  >
</head>

<body>

<nav>

  <a href="#" class="logo">
    <img src="logo.png" class="nav-logo-icon">
    ASTRO
  </a>

  <ul class="nav-links">
    <li><a href="#activities">활동</a></li>
    <li><a href="#notice">공지사항</a></li>
    <li><a href="#join">가입하기</a></li>
  </ul>

</nav>

<div class="hero">

  <div class="hero-text">

    <span class="hero-tag">
      북일고등학교 항공우주·기계공학 동아리
    </span>

    <h1>
      Bugil Academy<br>
      ASTRO 🚀
    </h1>

    <p>
      미래 공학도를 위한 프로젝트 중심 항공우주 동아리
    </p>

    <div class="hero-btns">

      <a href="#join" class="btn btn-blue">
        동아리 지원하기
      </a>

      <button class="btn btn-outline" id="loginBtn">
        관리자 로그인
      </button>

    </div>

  </div>

  <div class="hero-logo">
    <img src="logo.png">
  </div>

</div>

<hr class="divider">

<section id="activities">

  <p class="section-label">Activities</p>

  <h2>ASTRO는 이런 활동을 해요</h2>

  <div class="cards">

    <div class="card">
      <span class="card-icon">🚀</span>
      <h3>로켓 제작</h3>
      <p>실제 로켓 제작 및 발사 프로젝트 진행</p>
    </div>

    <div class="card">
      <span class="card-icon">✈️</span>
      <h3>항공역학 연구</h3>
      <p>항공기 구조 및 유체역학 연구</p>
    </div>

  </div>

</section>

<hr class="divider">

<section id="notice">

  <div class="notice-header">

    <div>
      <p class="section-label">Notice</p>
      <h2>공지사항</h2>
    </div>

    <button id="writeNoticeBtn" class="btn btn-blue hidden">
      공지 작성
    </button>

  </div>

  <div class="notice-list" id="noticeList">
  </div>

</section>

<!-- 공지 작성 모달 -->

<div class="modal hidden" id="noticeModal">

  <div class="modal-content">

    <h3>공지 작성</h3>

    <input type="text" id="noticeTitle" placeholder="제목">

    <textarea
      id="noticeContent"
      placeholder="내용"
    ></textarea>

    <button class="btn btn-blue" id="submitNotice">
      업로드
    </button>

  </div>

</div>

<footer>
  <p>© 2026 ASTRO</p>
</footer>

<script type="module" src="main.js"></script>

</body>
</html>
